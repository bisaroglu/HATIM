<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlobalHatim — AI Asistan</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1117;
      --surface:     #1a1d27;
      --surface-2:   #22263a;
      --border:      #2e3350;
      --accent:      #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.25);
      --user-bubble: #6c63ff;
      --ai-bubble:   #22263a;
      --text:        #e8eaf6;
      --text-muted:  #8b92b8;
      --font:        'Inter', system-ui, sans-serif;
      --radius:      14px;
      --transition:  0.2s ease;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Chat Container ────────────────────────────────────────────────── */
    .chat-wrapper {
      width: 100%;
      max-width: 720px;
      height: 100dvh;
      max-height: 820px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    /* ── Header ────────────────────────────────────────────────────────── */
    .chat-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface-2);
    }

    .chat-header .icon {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .chat-header .info h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .chat-header .info p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 6px #4ade80;
    }

    /* ── Messages ──────────────────────────────────────────────────────── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Message Bubbles ───────────────────────────────────────────────── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeUp 0.25s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai    { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 14px;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .msg.user .avatar { background: var(--user-bubble); }
    .msg.ai   .avatar { background: var(--surface-2); border: 1px solid var(--border); }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* ── Typing indicator ──────────────────────────────────────────────── */
    .typing-bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .typing-bubble span {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.75); opacity: 0.5; }
      40%           { transform: scale(1);    opacity: 1; }
    }

    /* ── Input Area ────────────────────────────────────────────────────── */
    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface-2);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }

    #userInput::placeholder { color: var(--text-muted); }

    #sendBtn {
      width: 36px; height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: opacity var(--transition), transform var(--transition);
    }

    #sendBtn:hover:not(:disabled) { opacity: 0.85; transform: scale(1.05); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #sendBtn svg { width: 16px; height: 16px; fill: #fff; }

    .input-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: center;
    }

    /* ── Empty state ───────────────────────────────────────────────────── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
    }

    .empty-state .big-icon { font-size: 40px; }
    .empty-state p { font-size: 14px; text-align: center; max-width: 260px; line-height: 1.6; }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <header class="chat-header">
    <div class="icon">🕌</div>
    <div class="info">
      <h1>GlobalHatim Asistan</h1>
      <p>Gemini AI destekli</p>
    </div>
    <div class="status-dot" title="Çevrimiçi"></div>
  </header>

  <!-- Messages -->
  <main class="chat-messages" id="chatMessages">
    <div class="empty-state" id="emptyState">
      <span class="big-icon">✨</span>
      <p>Hatim, cüz veya okuma planınız hakkında soru sorabilirsiniz.</p>
    </div>
  </main>

  <!-- Input -->
  <footer class="chat-input-area">
    <div class="input-row">
      <textarea
        id="userInput"
        placeholder="Bir şeyler sorun…"
        rows="1"
        aria-label="Mesaj girin"
      ></textarea>
      <button id="sendBtn" aria-label="Gönder" title="Gönder (Enter)">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Enter → gönder &nbsp;·&nbsp; Shift+Enter → yeni satır</p>
  </footer>

</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  // Gerçek uygulamada bu URL ortam değişkeninden veya bir config dosyasından okunur.
  const API_BASE = 'http://localhost:5000'; // ← geliştirme ortamı

  // ── DOM referansları ──────────────────────────────────────────────────────
  const messagesEl  = document.getElementById('chatMessages');
  const inputEl     = document.getElementById('userInput');
  const sendBtn     = document.getElementById('sendBtn');
  const emptyState  = document.getElementById('emptyState');

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // ── Klavye kısayolları ────────────────────────────────────────────────────
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  // ── Mesaj ekleme yardımcısı ───────────────────────────────────────────────
  function appendMessage(role, text) {
    emptyState.style.display = 'none';

    const msg    = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatar  = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble  = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollToBottom();
    return bubble; // typing indicator için referans döner
  }

  // ── Yazıyor göstergesi ────────────────────────────────────────────────────
  function showTyping() {
    emptyState.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = 'msg ai';
    msg.id = 'typingIndicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-bubble';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function hideTyping() {
    document.getElementById('typingIndicator')?.remove();
  }

  // ── Scroll ────────────────────────────────────────────────────────────────
  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Ana gönderme fonksiyonu ───────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    // Kullanıcı balonunu ekle
    appendMessage('user', text);

    // Input'u temizle ve devre dışı bırak
    inputEl.value = '';
    inputEl.style.height = 'auto';
    setLoading(true);

    // Yazıyor göstergesi
    showTyping();

    try {
      const response = await fetch(`${API_BASE}/api/ai/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      hideTyping();

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.title || `HTTP ${response.status}`);
      }

      const data = await response.json();
      appendMessage('ai', data.reply ?? 'Yanıt alınamadı.');

    } catch (err) {
      hideTyping();
      appendMessage('ai', `⚠️ Bir hata oluştu: ${err.message}`);
    } finally {
      setLoading(false);
      inputEl.focus();
    }
  }

  function setLoading(state) {
    sendBtn.disabled = state;
    inputEl.disabled = state;
  }
</script>

</body>
</html>
